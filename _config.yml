title: "Lagerland Apps — Privacy-First iOS & macOS Apps"
description: "Calm, privacy-first apps for iPhone, iPad, Apple Watch, and Mac. No tracking, no ads, no accounts. Productivity, health, finance, and developer tools by an independent Apple developer."
tagline: "Privacy-first apps for iOS and macOS"
url: "https://lagerland-apps.github.io"
author: "Lagerland Apps"
email: "lagerland.apps@proton.me"
lang: en

collections:
  apps:
    output: true
    permalink: /apps/:slug/
  journal:
    output: true
    permalink: /journal/:slug/

defaults:
  - scope:
      path: ""
      type: apps
    values:
      layout: app
  - scope:
      path: ""
      type: journal
    values:
      layout: journal
  - scope:
      path: "google9835ba948bb89980.html"
    values:
      sitemap: false
  - scope:
      path: "404.html"
    values:
      sitemap: false
  - scope:
      path: "humans.txt"
    values:
      sitemap: false

include:
  - .well-known

# Internal files kept out of the published site. Note: setting `exclude`
# replaces Jekyll's default list, which is harmless here (no Gemfile/
# vendor/node_modules). scripts/ holds local tooling (ratings sync, OG/QR
# generators, a personal notifier) that was previously served publicly.
exclude:
  - CLAUDE.md
  - scripts/
  - README.md
  - 2.png

plugins:
  - jekyll-sitemap
  - jekyll-redirect-from
