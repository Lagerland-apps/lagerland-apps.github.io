<section id="screenshots" class="section reveal">
  <div class="section-head">
    <h2 class="h2">Screenshots</h2>
    <div class="section-sub">Swipe or drag to explore</div>
  </div>

  <div class="shots">
    {% for s in include.app.screenshots %}
      <figure class="shot">
        <img src="{{ s }}" alt="{{ include.app.name }} screenshot {{ forloop.index }}" loading="lazy">
      </figure>
    {% endfor %}
  </div>

  {% if include.app.screenshots.size > 1 %}
  <div class="shots-indicators">
    {% for s in include.app.screenshots %}
      <span class="shots-dot {% if forloop.first %}active{% endif %}"></span>
    {% endfor %}
  </div>
  {% endif %}
</section>
