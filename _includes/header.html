<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">
      <img class="brand-mark" src="{{ site.url }}/assets/icons/lagerland-mark.png" alt="Lagerland" width="30" height="30" decoding="async">
      <span class="brand-name">Lagerland</span>
    </a>
    <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <line x1="4" y1="7" x2="20" y2="7"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
      </svg>
    </button>
    <nav class="nav">
      <a href="/"{% if page.url == "/" %} aria-current="page"{% endif %}>Home</a>
      <a href="/apps/"{% if page.url contains "/apps/" %} aria-current="page"{% endif %}>Apps</a>
      <a href="/journal/"{% if page.url contains "/journal/" %} aria-current="page"{% endif %}>Journal</a>
      <a href="/lagerland-apps/"{% if page.url contains "/lagerland-apps/" %} aria-current="page"{% endif %}>About</a>
      <a href="/support/"{% if page.url == "/support/" %} aria-current="page"{% endif %}>Support</a>
    </nav>
  </div>
</header>
