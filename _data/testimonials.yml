# ============================================================
# Per-app user testimonials for the ticker.
# Structure: testimonials[<app-slug>] = [ { quote, author, source, rating?, language, tier, translation_en? }, ... ]
#
# Fields:
#   quote          – exact user quote, in the original language
#   author         – initials or short handle (privacy-safe)
#   source         – "App Store" | "Reddit" | "Email" | …
#   rating         – 1–5 (omit if not a star-rated source)
#   language       – BCP-47 code ("en", "fr", "de", "es", …)
#   tier           – "hero" (large, prioritised) | "ticker" (marquee only)
#   translation_en – English translation, only when language != "en"
# ============================================================

gymlogger-x:
  # Curated to the five longest, most specific, most credible quotes.
  # Short filler quotes ("Super app!", "First impression 🔝", "Looks legit useful")
  # dilute strong testimonials and read as desperate. Quality > volume.
  - quote: "I'm normally not interested in fitness apps but this one feels different. I created a smart program and I actually feel like it's doable. Thank you for creating something that makes sense to people who don't live in the gym."
    author: "K.D."
    source: "App Store"
    rating: 5
    language: "en"
    tier: "hero"

  - quote: "Your app is much better than my initial impressions. The import function is actually well thought out. Other apps always failed to import my workouts — yours gave me options to define how the data works, so I imported everything painlessly."
    author: "P.O."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "Now this is an app for the gym. No crap that tries to get you to follow their routine. You can do your own. Logs your weight, your reps, and follows you. A fantastic app and well put together."
    author: "P.S."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "Really useful app with a clean and simple design. Everything works smoothly — great job by the developer."
    author: "R.O."
    source: "App Store"
    rating: 5
    language: "en"
    tier: "hero"

  - quote: "App installée aujourd'hui et déjà au top ! Pas de vidéos mais des schémas hyper clairs et bien expliqués qui guident parfaitement les exercices. Première séance ce matin fluide, interface intuitive et rappels motivants. Parfait pour débuter en musculation ! 💪"
    author: "M."
    source: "App Store"
    rating: 5
    language: "fr"
    tier: "hero"
    translation_en: "Installed the app today and it's already top-tier! No videos, but super clear, well-explained diagrams that guide the exercises perfectly. First session this morning was smooth — intuitive interface, motivating reminders. Perfect for getting started with strength training! 💪"

observa:
  # Curated to the five strongest, most specific quotes.
  # Short filler ("great UI", "the data amount is insane", "it is worth a lot")
  # was deliberately left out — it dilutes the credible long quotes.
  - quote: "This is the kind of app Apple probably thinks Apple Health already is. The correlation engine is what makes it work — raw health data without context is basically useless for most people. 'Your HRV is 54' means nothing. 'Your sleep tanks every time you train late' is actually actionable. Huge respect for keeping everything on-device with no account, too. Health apps shipping deeply personal data to random servers has become weirdly normalized lately, so seeing one go the opposite direction is refreshing."
    author: "H.P."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "Love seeing the correlation engine — finding real associations between habits and sleep or HRV is the kind of thing most health apps just don't do because it's hard to build well. The 100% on-device approach is the right call for this kind of data too. People are way more likely to actually use something when they trust where their health data is going."
    author: "O.A."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "This is how it should be. Maybe a bit technical for most people, but too many apps are making claims without telling the user whether the number is any good. Observa actually shows you the baseline behind the insight."
    author: "I.D."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "Sleek design, and the insights are genuinely pleasant to use to track and understand the different phases of my day. Already my new daily app."
    author: "C."
    source: "App Store"
    rating: 5
    language: "en"
    tier: "hero"

  - quote: "Super appli pour suivre sa récupération, son sommeil et son stress de façon claire et détaillée. J'apprécie surtout le respect de la vie privée : tout reste sur l'iPhone, sans compte ni pub. Les nouveaux graphiques sont vraiment propres et faciles à lire. 👍"
    author: "K."
    source: "App Store"
    rating: 5
    language: "fr"
    tier: "hero"
    translation_en: "Great app for tracking recovery, sleep, and stress clearly and in detail. I especially appreciate the respect for privacy: everything stays on the iPhone, no account, no ads. The new charts are really clean and easy to read. 👍"

soon:
  # Curated to the five most specific, most credible quotes.
  # Short praise ("Best looking app ever", "very well done I like it", "love it!")
  # was deliberately left out — it dilutes the strong, substantive testimonials.
  - quote: "The emotional framing is what makes this feel different from the usual countdown apps. Most of them are just timers, but the photo plus weather angle makes the waiting feel attached to a real future moment instead of an abstract number. The anniversary return for past events is also smart, because it turns the app from a one-time utility into something people might keep around after the trip or wedding is over."
    author: "P.S."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "That framing is good. 'Make the waiting itself pretty' is much more memorable than just another countdown utility."
    author: "M.B."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "The weather tie-in is a smart differentiator. Most countdown apps stop at the date, but for trips and outdoor events the forecast becoming visible is genuinely part of the anticipation."
    author: "D.N."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "Countdown apps are so simple, but this is done really cleanly. I love the idea of an added checklist of things to prepare for."
    author: "K.C."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "The emotional angle is strong — most countdown apps just show a number, but the waiting is often part of the moment."
    author: "O."
    source: "Reddit"
    language: "en"
    tier: "hero"

chessful:
  # Curated from Reddit messages. Names reduced to initials.
  # Off-topic parts (feature-request asides, opening pleasantries) trimmed —
  # the quote itself is kept verbatim within each kept sentence.
  - quote: "Hey, just wanted to tell you how amazing Chessful has become. I'm actually able to improve on my mistakes — I get to understand both the mistakes and the engine now."
    author: "S."
    source: "Reddit"
    language: "en"
    tier: "hero"

  - quote: "Your app is the best I've found so far — along with Lina Chess and Chess Tiger Pro, which I've purchased both. I'd like to close my collection of analysis apps with yours."
    author: "V.V."
    source: "Reddit"
    language: "en"
    tier: "hero"
