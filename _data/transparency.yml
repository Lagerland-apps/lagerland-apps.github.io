    manifest_source: source
    tracking_declared: false
    tracking_domains: 0
    third_party_sdks: 0
    third_party_sdks_list: []
    account_required: false
    network_calls: "None — HealthKit and EventKit only (local frameworks). Optional iCloud sync uses your own iCloud."
    data_leaves_device: "Your iCloud only, if enabled."
    analytics: "None."
    collected_data:
      - "Health & Fitness (purpose: app functionality, not linked, not used for tracking)"
    required_reason_apis:
      - "UserDefaults (CA92.1 — read/write app-specific user defaults)"
    permissions:
      - "Calendar (read-only) — detect work shifts"
      - "HealthKit (read sleep) — calculate recovery between shifts"
    notes: "Calendar and Health data never leave the device."

