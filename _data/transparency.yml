# Per-app transparency data — sourced from each app's PrivacyInfo.xcprivacy
# (where committed) and project structure verified against the GitHub repo on
# the date shown. Fields use Apple's terms where possible:
#   - tracking_declared      : value of NSPrivacyTracking
#   - tracking_domains       : count from NSPrivacyTrackingDomains array
#   - collected_data         : NSPrivacyCollectedDataTypes (Apple's category names)
#   - required_reason_apis   : NSPrivacyAccessedAPITypes (Apple's category names)
#   - third_party_sdks       : declared SPM/Cocoapods/Carthage dependencies
#   - manifest_source        : "source" = read from PrivacyInfo.xcprivacy in repo;
#                              "submission" = ships in the App Store binary; verify on
#                              the App Store Privacy Nutrition Label
#   - last_verified          : ISO-8601 date the row was last cross-checked
#
# Edit the manifest, push, and update this file. Treat it as the canonical proof
# layer the homepage transparency table and /transparency/ page both render from.

last_audit: "2026-05-13"

apps:
