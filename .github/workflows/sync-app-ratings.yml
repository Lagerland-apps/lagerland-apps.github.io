name: Sync App Store ratings

on:
  workflow_dispatch:
  schedule:
    - cron: "7 6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-app-ratings
  cancel-in-progress: false

jobs:
  sync:
    name: Fetch ratings and commit changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run ratings sync
        run: python3 scripts/sync-app-ratings.py --verbose

      - name: Write run summary
        if: always()
        run: |
          echo "### App Store ratings sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          git diff --stat -- _apps/ >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if git diff --quiet -- _apps/; then
            echo "_No changes - all app ratings were already up to date._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_Changes will be committed and pushed to main, triggering a Pages rebuild._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push if changed
        env:
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if git diff --quiet -- _apps/; then
            echo "No rating changes - skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _apps/*.md
          SUBJECT="Sync App Store ratings ($(date -u +%Y-%m-%d))"
          BODY="Automated weighted-average sync across Apple storefronts. Trigger: ${EVENT}. Run: ${RUN_URL}"
          git commit -m "$SUBJECT" -m "$BODY"
          git push origin main
