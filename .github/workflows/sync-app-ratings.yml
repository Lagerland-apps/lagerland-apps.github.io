name: Sync App Store ratings

on:
  schedule:
    # Daily at 06:07 UTC — offset off the hour to avoid the cron spike
    - cron: '7 6 * * *'
  workflow_dispatch:  # manual "Run workflow" button in the Actions tab

permissions:
  contents: write

concurrency:
  group: sync-app-ratings
  cancel-in-progress: false

jobs:
  sync:
    name: Fetch ratings and commit changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run ratings sync
        run: python3 scripts/sync-app-ratings.py --verbose

      - name: Write summary
        if: always()
        run: |
          {
            echo "### App Store ratings sync"
            echo ""
            echo '```'
            git diff --stat -- _apps/ || true
            echo '```'
            echo ""
            if git diff --quiet -- _apps/; then
              echo "_No changes — all app ratings were already up to date._"
            else
              echo "_Changes will be committed and pushed to \`main\`, triggering a Pages rebuild._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- _apps/; then
            echo "No rating changes — skipping commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _apps/*.md

          git commit -m "Sync App Store ratings ($(date -u +%Y-%m-%d))

Automated weighted-average sync across Apple storefronts.
Trigger: ${{ github.event_name }}
Run:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          git push origin main
